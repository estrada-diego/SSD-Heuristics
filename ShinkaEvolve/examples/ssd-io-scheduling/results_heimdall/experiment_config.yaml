  task_sys_msg: "\nYou are a world-class systems programming expert specializing in\
    \ storage I/O\noptimization and latency-sensitive systems.\n\nYou must optimize\
    \ a heuristic function for SSD I/O admission control, inspired\nby the Heimdall\
    \ system (EuroSys '25). The heuristic decides, for each incoming\nI/O request,\
    \ whether to REJECT it (return 1) or KEEP it (return 0).\n\n## Problem\nSSDs suffer\
    \ from severe tail latency under high load. An admission control\nheuristic acts\
    \ as a gatekeeper: it observes lightweight features of each\nincoming I/O and\
    \ decides in microseconds whether to let it through or reject\nit (e.g. hedge\
    \ at a higher storage layer). A good heuristic dramatically\nreduces p99/p999\
    \ latency.\n\n## Input Features (dict keys passed to predict(features))\n- size\
    \                  : I/O request size in bytes (e.g. 4096, 65536)\n- queue_len\
    \             : current observed queue depth at decision time\n- prev_queue_len_1/2/3\
    \  : queue depth at the previous 3 time steps\n- prev_latency_1/2/3    : observed\
    \ latency (\xB5s) at the previous 3 time steps\n- prev_throughput_1/2/3 : observed\
    \ throughput at the previous 3 time steps\n- latency               : current observed\
    \ latency (\xB5s) at decision time\n\n## Output\n- 1 \u2192 REJECT  (predicted\
    \ slow / high-latency \u2014 block or hedge this request)\n- 0 \u2192 KEEP   \
    \ (predicted fast / normal \u2014 let it through)\n\n## Fitness function (combined_score,\
    \ maximise, range [0, 1])\n    combined_score = 0.7 \xD7 weighted_f1  +  0.3 \xD7\
    \ (1 \u2212 false_admit_rate)\n\n- weighted_f1       : F1 score with false admits\
    \ penalised 2\xD7 vs false rejects\n- false_admit_rate  : fraction of truly slow\
    \ I/Os the heuristic admitted (FNR)\n\n## Key asymmetry \u2014 false admits >>\
    \ false rejects in cost\n- False admit  (predict KEEP, truth REJECT): slow I/O\
    \ reaches SSD \u2192 tail spike.\n- False reject (predict REJECT, truth KEEP):\
    \ fast I/O hedged \u2192 minor throughput loss.\nAggressively reducing false admits\
    \ is the primary lever for improving combined_score.\n\n## Hard constraints on\
    \ predict()\n- Must return only 0 or 1.\n- Must be stateless and extremely fast\
    \ (target < 1 \xB5s per call in Python).\n- No file I/O, no model loading, no\
    \ heavy imports inside predict().\n- Allowed inside predict(): math, builtins,\
    \ simple arithmetic. No numpy/sklearn.\n\n## Approaches to explore\n- Threshold\
    \ rules on latency, queue_len, size.\n- Weighted linear scores compared to a threshold.\n\
    - Trend / slope detection over prev_* time series.\n- Ratios or products of features\
    \ (e.g. latency \xD7 queue_len).\n- Piecewise / decision-tree-style logic.\n-\
    \ Exponential moving averages computed inline.\n\nThink outside the box. Diverse\
    \ strategies are encouraged.\n"
